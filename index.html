<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Sports Center</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  
<header class="header">
    <div class="container header-container">
        <div class="logo">
            <img src="assets/images/logo.jpg" alt="Fitness Sport Center Logo" class="logo-img">
            <span class="logo-text">FITNESS SPORT CENTER</span>
        </div>
        <nav class="nav">
            <ul>
                <a href="#" class="btn-nav">Get Started</a>
            </ul>
        </nav>
        <button id="darkModeToggle" class="dark-mode-btn">🌙 Dark Mode</button>
    </div>
</header>

    <section class="hero">
        <div class="container hero-container">
            <h1 class="hero-title">FITNESS SPORTS CENTER</h1>
            <p class="hero-subtitle">Join us today</p>
            <a href="#" class="btn">Get Started</a>
        </div>
    </section>

    <section class="about">
          <h1 class="about-h1">About Us</h1>
        <div class="container about-container">
            <div class="about-image">
                <img src="assets/images/about.jpg" alt="About Fitness Sports Center">
            </div>
            <div class="about-text">
                <p class="intro">Introduction</p>
                <p>FITNESS SPORTS CENTER is a premium gym built for all fitness levels. From beginners to pros, we provide the best equipment and training to help you reach your goals.</p>
            </div>
        </div>
    </section>
</body>
</html>
